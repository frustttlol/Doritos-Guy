<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · Doritos Guy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#161b22;
    --orange:#ff5a00;
    --dust:#ffb800;
    --muted:#8b94a3;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex}
  .sidebar{width:260px;background:var(--panel);padding-top:90px;border-right:1px solid #ff5a0022;height:100vh;position:fixed;overflow-y:auto}
  .nav-item{padding:16px 24px;color:var(--muted);cursor:pointer;transition:0.2s}
  .nav-item:hover,.nav-item.active{background:#ff5a0011;color:var(--dust)}
  header{position:fixed;top:0;left:260px;right:0;background:rgba(10,14,20,0.95);padding:16px 6%;border-bottom:1px solid #ff5a0022;backdrop-filter:blur(12px);z-index:100;display:flex;justify-content:space-between;align-items:center}
  .brand{font-size:28px;color:var(--orange);display:flex;align-items:center;gap:12px}
  main{margin-left:260px;padding:110px 6% 80px;flex:1}
  .stat{background:var(--panel);border:1px solid #ff5a0033;border-radius:16px;padding:24px;margin-bottom:20px}
  .gauge-track{height:48px;background:#111;border-radius:999px;overflow:hidden;position:relative;border:3px solid #ff5a0022}
  .gauge-fill{height:100%;background:linear-gradient(90deg,#ffd93d,#ff8c00,#ff5a00);width:78%;position:relative}
  .wave{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35));animation:wave 3.5s linear infinite}
  @keyframes wave{0%{transform:translateX(-50%)}100%{transform:translateX(50%)}}
  .toggle{position:relative;display:inline-block;width:52px;height:28px}
  .toggle input{display:none}
  .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#333;border-radius:999px}
  .slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.4s}
  input:checked + .slider{background:var(--orange)}
  input:checked + .slider:before{transform:translateX(24px)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="nav-item active">Overview</div>
  <div class="nav-item">Servers</div>
  <div class="nav-item">General Settings</div>
  <div class="nav-item">Moderation</div>
  <div class="nav-item">Fun Commands</div>
  <div class="nav-item">Logs</div>
</div>

<header>
  <div class="brand">
    <span>🥔</span>
    <span>DORITOS GUY</span>
  </div>
  <button onclick="loginWithDiscord()" style="background:linear-gradient(#ff5a00,#ff8c00);color:#000;padding:12px 32px;border:none;border-radius:12px;font-weight:700;cursor:pointer">CONNECT DISCORD</button>
</header>

<main>
  <h1 style="font-size:52px;color:var(--orange)" class="display">OVERVIEW</h1>
  <p style="color:var(--muted);font-size:18px">Your servers are protected with maximum crunch.</p>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:40px">
    <div class="stat">
      <div style="color:var(--muted)">TOTAL MEMBERS</div>
      <div style="font-size:52px;color:var(--orange)">1,337</div>
    </div>
    <div class="stat">
      <div style="color:var(--muted)">VERIFIED</div>
      <div style="font-size:52px">892</div>
    </div>
    <div class="stat">
      <div style="color:var(--muted)">COMMANDS TODAY</div>
      <div style="font-size:52px;color:var(--dust)">69</div>
    </div>
  </div>

  <div style="margin-top:50px" class="stat">
    <h2 style="color:var(--dust)">CRUNCH-O-METER™</h2>
    <div style="font-size:62px;color:var(--dust)" id="score">78%</div>
    <div class="gauge-track">
      <div class="gauge-fill" id="fill">
        <div class="wave"></div>
      </div>
    </div>
  </div>

  <div style="margin-top:50px">
    <h2>General Settings</h2>
    <div style="background:var(--panel);padding:30px;border-radius:16px">
      <div style="margin:20px 0"><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label> Member Verification</div>
      <div style="margin:20px 0"><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label> Auto Moderation</div>
      <div style="margin:20px 0"><label class="toggle"><input type="checkbox"><span class="slider"></span></label> Anti-Raid Mode</div>
      <div style="margin:20px 0"><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label> Welcome Messages</div>
    </div>
  </div>
</main>

<script>
const CLIENT_ID = "1522890288920793162";

function loginWithDiscord() {
  const REDIRECT_URI = window.location.href.split('#')[0];
  const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify+guilds`;
  window.location.href = url;
}

// Liquid effect
setInterval(() => {
  const wave = document.querySelector('.wave');
  if (wave) {
    wave.style.animation = 'none';
    void wave.offsetWidth;
    wave.style.animation = 'wave 3.5s linear infinite';
  }
}, 3500);
</script>
</body>
</html>
