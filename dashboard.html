<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · Doritos Guy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#161b22;
    --orange:#ff5a00;
    --dust:#ffb800;
    --muted:#8b94a3;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex}
  .sidebar{width:260px;background:var(--panel);padding-top:90px;border-right:1px solid #ff5a0022;height:100vh;position:fixed}
  .nav-item{padding:16px 24px;color:var(--muted);cursor:pointer}
  .nav-item:hover,.nav-item.active{background:#ff5a0011;color:var(--dust)}
  header{position:fixed;top:0;left:260px;right:0;background:rgba(10,14,20,0.95);padding:16px 6%;border-bottom:1px solid #ff5a0022;backdrop-filter:blur(12px);z-index:100;display:flex;justify-content:space-between}
  main{margin-left:260px;padding:110px 6% 80px;flex:1}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin:40px 0}
  .stat{background:var(--panel);border:1px solid #ff5a0033;border-radius:16px;padding:24px}
  .stat .value{font-size:48px;font-weight:700}
  .gauge-track{height:48px;background:#111;border-radius:999px;overflow:hidden;position:relative;border:3px solid #ff5a0022}
  .gauge-fill{height:100%;background:linear-gradient(90deg,#ffd93d,#ff8c00,#ff5a00);transition:width 0.6s}
  .wave{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35));animation:wave 3.5s linear infinite}
  @keyframes wave{0%{transform:translateX(-50%)}100%{transform:translateX(50%)}}
  .toggle{position:relative;display:inline-block;width:52px;height:28px}
  .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#333;border-radius:999px}
  .slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.4s}
  input:checked + .slider{background:var(--orange)}
  input:checked + .slider:before{transform:translateX(24px)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="nav-item active">Overview</div>
  <div class="nav-item">Servers</div>
  <div class="nav-item">General Settings</div>
  <div class="nav-item">Moderation</div>
  <div class="nav-item">Fun Commands</div>
  <div class="nav-item">Anti-Raid</div>
  <div class="nav-item">Logs</div>
  <div class="nav-item">Analytics</div>
</div>

<header>
  <div style="font-size:26px;color:var(--orange)">DORITOS GUY DASHBOARD</div>
  <button onclick="loginWithDiscord()" style="background:#ff5a00;color:black;padding:12px 28px;border:none;border-radius:12px;font-weight:700;cursor:pointer">CONNECT DISCORD</button>
</header>

<main>
  <h1 style="font-size:48px;color:var(--orange)">OVERVIEW</h1>

  <div class="stats">
    <div class="stat">
      <div style="color:var(--muted)">TOTAL MEMBERS</div>
      <div class="value" style="color:var(--orange)">1,337</div>
    </div>
    <div class="stat">
      <div style="color:var(--muted)">VERIFIED</div>
      <div class="value">892</div>
    </div>
    <div class="stat">
      <div style="color:var(--muted)">COMMANDS TODAY</div>
      <div class="value" style="color:var(--dust)">69</div>
    </div>
  </div>

  <div style="margin-top:40px">
    <h2>CRUNCH-O-METER</h2>
    <div style="background:var(--panel);padding:30px;border-radius:16px">
      <div id="score" style="font-size:62px;color:var(--dust)">65%</div>
      <div class="gauge-track">
        <div class="gauge-fill" id="fill" style="width:65%"></div>
        <div class="wave"></div>
      </div>
    </div>
  </div>

  <div style="margin-top:40px">
    <h2>Security Features</h2>
    <div style="background:var(--panel);padding:30px;border-radius:16px">
      <div style="margin:18px 0">
        <label class="toggle"><input type="checkbox" onchange="updateCrunch()" checked><span class="slider"></span></label>
        Member Verification (+20)
      </div>
      <div style="margin:18px 0">
        <label class="toggle"><input type="checkbox" onchange="updateCrunch()" checked><span class="slider"></span></label>
        Auto Moderation (+20)
      </div>
      <div style="margin:18px 0">
        <label class="toggle"><input type="checkbox" onchange="updateCrunch()"><span class="slider"></span></label>
        Anti-Raid Mode (+25)
      </div>
      <div style="margin:18px 0">
        <label class="toggle"><input type="checkbox" onchange="updateCrunch()" checked><span class="slider"></span></label>
        Action Logging (+15)
      </div>
    </div>
  </div>
</main>

<script>
const CLIENT_ID = "1522890288920793162";
const weights = [20, 20, 25, 15];

function loginWithDiscord() {
  const REDIRECT_URI = window.location.href.split('#')[0];
  const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify+guilds`;
  window.location.href = url;
}

function updateCrunch() {
  let score = 0;
  document.querySelectorAll('input[type="checkbox"]').forEach((cb, i) => {
    if (cb.checked) score += weights[i] || 0;
  });
  score = Math.min(100, score);
  document.getElementById('fill').style.width = score + '%';
  document.getElementById('score').textContent = score + '%';
}
</script>
</body>
</html>
