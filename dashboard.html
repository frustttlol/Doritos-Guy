<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Doritos Guy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #0a0e14, #1a1f2e);
            color: #fff;
            min-height: 100vh;        }
        .header {
            background: #0f141c;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff5a00;
        }
        .title {
            font-size: 32px;
            color: #ff5a00;
        }
        .connect-btn {
            background: #ff5a00;
            color: black;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .main {
            padding: 40px;
        }
        .meter {
            background: #1a1f2e;
            padding: 30px;
            border-radius: 16px;
            margin: 30px 0;
            border: 2px solid #ff5a00;
        }
        .gauge {
            height: 50px;
            background: #111;
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }
        .fill {
            height: 100%;
            width: 78%;
            background: linear-gradient(90deg, #ffeb3b, #ff9800, #f44336);
            transition: width 0.5s;
        }
        .wave {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(transparent, rgba(255,255,255,0.4));
            animation: wave 2s linear infinite;
        }
        @keyframes wave {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🥔 DORITOS GUY DASHBOARD</div>
        <button class="connect-btn" onclick="connectDiscord()">CONNECT DISCORD</button>
    </div>

    <div class="main">
        <h1 style="color:#ff5a00">Overview</h1>
        <p>Server protection level: <strong>HOT</strong></p>

        <div class="meter">
            <h2>CRUNCH-O-METER</h2>
            <div class="gauge">
                <div class="fill" id="fill"></div>
                <div class="wave"></div>
            </div>
            <p style="text-align:center;margin-top:10px" id="score">78% CRUNCHY</p>
        </div>

        <button onclick="randomCrunch()" style="padding:10px 20px;margin-top:20px">Random Crunch</button>
    </div>

    <script>
        const CLIENT_ID = "1522890288920793162";

        function connectDiscord() {
            const redirect = window.location.href.split('#')[0];
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=identify+guilds`;
            window.location.href = url;
        }

        function randomCrunch() {
            let percent = 78;
            const fill = document.getElementById('fill');
            const score = document.getElementById('score');
            
            setInterval(() => {
                percent = Math.max(60, Math.min(95, percent + (Math.random() * 12 - 6)));
                fill.style.width = percent + '%';
                score.textContent = Math.round(percent) + '% CRUNCHY';
            }, 1500);
        }
    </script>
</body>
</html>
