<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · Doritos Guy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#161b22;
    --panel-hi:#1d2430;
    --line:#262d3a;
    --text:#f2f3f5;
    --muted:#8b94a3;
    --orange:#ff5a00;
    --dust:#ffb800;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex}
  .display{font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}
  header{
    position:fixed;top:0;left:0;right:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 6%;background:rgba(10,14,20,0.95);
    border-bottom:1px solid #ff5a0022;
    backdrop-filter:blur(12px);z-index:100;
  }
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer}
  .brand .chip{font-size:32px}
  .sidebar{
    width:260px;background:var(--panel);border-right:1px solid var(--line);
    padding-top:80px;position:fixed;height:100%;overflow-y:auto;
  }
  .nav-item{
    padding:14px 24px;color:var(--muted);cursor:pointer;transition:0.2s;
  }
  .nav-item:hover,.nav-item.active{background:#ff5a0011;color:var(--dust)}
  main{margin-left:260px;padding:100px 6% 80px;flex:1}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:40px}
  .stat{
    background:var(--panel);border:1px solid #ff5a0033;border-radius:16px;
    padding:24px;box-shadow:0 10px 30px rgba(0,0,0,0.4);
  }
  .stat .value{font-family:'Bebas Neue';font-size:46px;margin-top:8px}
  .meter-section{
    margin-top:50px;background:var(--panel);border:1px solid #ff5a0033;
    border-radius:20px;padding:32px;box-shadow:0 15px 40px rgba(255,90,0,0.15);
  }
  .gauge-track{
    height:42px;border-radius:999px;background:#0f141c;
    border:3px solid #ff5a0022;overflow:hidden;position:relative;
  }
  .gauge-fill{
    height:100%;background:linear-gradient(90deg,#ffd93d,#ff8c00,#ff5a00);
    box-shadow:0 0 30px #ff5a00;position:relative;
  }
  .liquid{
    position:absolute;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(transparent,rgba(255,220,100,0.35));
    animation:wave 3.5s linear infinite;
    opacity:0.45;
  }
  @keyframes wave{0%{transform:translateX(-25%)} 100%{transform:translateX(25%)}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="chip">🥔</span>
    <span class="display" style="font-size:28px">DORITOS GUY</span>
  </div>
  <button onclick="loginWithDiscord()" style="background:linear-gradient(#ff5a00,#ff8c00);color:black;padding:12px 28px;border:none;border-radius:12px;font-weight:700;cursor:pointer">CONNECT DISCORD</button>
</header>

<div class="sidebar">
  <div class="nav-item active">Overview</div>
  <div class="nav-item">Servers</div>
  <div class="nav-item">Settings</div>
  <div class="nav-item">Logs</div>
  <div class="nav-item">Commands</div>
  <div class="nav-item">Analytics</div>
</div>

<main>
  <h1 class="display" style="font-size:52px">OVERVIEW</h1>
  <p style="color:var(--muted)">Protecting servers with maximum crunch.</p>

  <div class="stats">
    <div class="stat"><div style="color:var(--muted);font-size:13px">TOTAL MEMBERS</div><div class="value" style="color:var(--orange)" id="stat-total">1337</div></div>
    <div class="stat"><div style="color:var(--muted);font-size:13px">VERIFIED</div><div class="value" id="stat-verified">892</div></div>
    <div class="stat"><div style="color:var(--muted);font-size:13px">COMMANDS TODAY</div><div class="value" style="color:var(--dust)" id="stat-commands">69</div></div>
  </div>

  <div class="meter-section">
    <h2 class="display">CRUNCH-O-METER™</h2>
    <div id="score" style="font-size:52px;font-weight:700;color:var(--dust)">78%</div>
    <div class="gauge-track">
      <div class="gauge-fill" id="fill" style="width:78%"></div>
      <div class="liquid"></div>
    </div>
    <div class="labels" style="display:flex;justify-content:space-between;margin-top:12px;font-size:12px;color:var(--muted)">
      <span>STALE</span><span>MILD</span><span>MEDIUM</span><span>HOT</span><span>NUCLEAR</span>
    </div>
  </div>
</main>

<script>
const CLIENT_ID = "1522890288920793162";

function loginWithDiscord() {
  const REDIRECT_URI = window.location.href.split('#')[0];
  const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify+guilds`;
  window.location.href = url;
}

// Liquid meter animation
function animateMeter() {
  let score = 78;
  const fill = document.getElementById('fill');
  const scoreEl = document.getElementById('score');

  setInterval(() => {
    score = Math.max(65, Math.min(89, score + (Math.random()*6 - 3)));
    fill.style.width = score + '%';
    scoreEl.textContent = Math.round(score) + '%';
  }, 2200);
}

window.onload = animateMeter;
</script>
</body>
</html>
