<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Doritos Guy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --orange: #ff5a00;
            --dust: #ffb800;
            --muted: #8b94a3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #f2f3f5;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--orange); }
        button { 
            background: var(--orange); 
            color: black; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <h1>Doritos Guy Dashboard</h1>
    <p>Client ID connected: 1522890288920793162</p>
    <button onclick="connect()">Connect Discord</button>

    <script>
        function connect() {
            const CLIENT_ID = "1522890288920793162";
            const REDIRECT_URI = window.location.href.split('#')[0];
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify+guilds`;
            window.location.href = url;
        }
    </script>
</body>
</html>
