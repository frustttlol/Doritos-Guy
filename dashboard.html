<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · Doritos Guy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#161b22;
    --orange:#ff5a00;
    --dust:#ffb800;
    --green:#3ecf6e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background: var(--bg);
    color:#f2f3f5;
    font-family:'Inter',sans-serif;
    min-height:100vh;
    background: linear-gradient(180deg, #0a0e14, #0f141c);
  }
  .display{font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 6%; background:rgba(11,14,19,0.95);
    border-bottom:1px solid #ff5a0022;
    backdrop-filter:blur(12px);
    position:sticky;top:0;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer}
  .brand .chip{font-size:32px;filter:drop-shadow(0 0 10px #ff5a00)}
  .connect-btn{
    background:linear-gradient(90deg,#ff5a00,#ff8c00);
    color:#000;font-weight:700;padding:12px 24px;
    border:none;border-radius:12px;cursor:pointer;
    box-shadow:0 4px 15px rgba(255,90,0,0.4);
    transition:0.3s;
  }
  .connect-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,90,0,0.6)}
  main{padding:50px 6% 80px;max-width:1300px;margin:0 auto}
  h1.page-title{font-size:52px;background:linear-gradient(90deg,#ff5a00,#ffb800); -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:40px}
  .stat{
    background:var(--panel);border:1px solid #ff5a0033;
    border-radius:16px;padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:0.3s;
  }
  .stat:hover{transform:translateY(-6px);border-color:#ff5a00}
  .stat .value{font-family:'Bebas Neue';font-size:46px;margin-top:8px}
  .meter-section{
    margin-top:50px;background:var(--panel);border:1px solid #ff5a0033;
    border-radius:20px;padding:32px;
    box-shadow:0 15px 40px rgba(255,90,0,0.15);
  }
  .gauge-track{
    height:32px;border-radius:999px;background:#0f141c;
    border:2px solid #ff5a0022;overflow:hidden;
  }
  .gauge-fill{
    height:100%;background:linear-gradient(90deg,#ffd93d,#ff8c00,#ff5a00);
    box-shadow:0 0 25px #ff5a00;
    transition:width .6s cubic-bezier(0.4,0,0.2,1);
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="chip">🥔</span>
    <span class="display" style="font-size:28px">DORITOS GUY</span>
  </div>
  <button class="connect-btn" onclick="loginWithDiscord()">CONNECT DISCORD</button>
</header>

<main>
  <h1 class="page-title display">OVERVIEW</h1>
  <p style="color:#8b94a3;font-size:18px">Maximum crunch engaged.</p>

  <div class="stats">
    <div class="stat">
      <div style="color:#8b94a3;font-size:13px">TOTAL MEMBERS</div>
      <div class="value" style="color:#ff5a00" id="stat-total">1,337</div>
    </div>
    <div class="stat">
      <div style="color:#8b94a3;font-size:13px">VERIFIED</div>
      <div class="value" id="stat-verified">892</div>
    </div>
    <div class="stat">
      <div style="color:#8b94a3;font-size:13px">COMMANDS TODAY</div>
      <div class="value" style="color:#ffb800" id="stat-commands">69</div>
    </div>
  </div>

  <div class="meter-section">
    <h2 class="display" style="font-size:32px">CRUNCH-O-METER™</h2>
    <div class="gauge-track"><div class="gauge-fill" id="gauge" style="width:78%"></div></div>
    <div style="margin-top:12px;color:#ffb800;font-weight:600">HOT — WELL DEFENDED 🔥</div>
  </div>
</main>

<script>
const CLIENT_ID = "1522890288920793162";

function loginWithDiscord() {
  const REDIRECT_URI = window.location.href.split('#')[0];
  const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify+guilds`;
  window.location.href = url;
}
</script>
</body>
</html>
