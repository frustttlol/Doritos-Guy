<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · Doritos Guy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#161b22;
    --orange:#ff5a00;
    --dust:#ffb800;
    --muted:#8b94a3;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex}
  .sidebar{width:260px;background:var(--panel);padding-top:90px;border-right:1px solid #ff5a0022;height:100vh;position:fixed}
  .nav-item{padding:16px 24px;color:var(--muted);cursor:pointer}
  .nav-item:hover,.nav-item.active{background:#ff5a0011;color:var(--dust)}
  header{
    position:fixed;top:0;left:260px;right:0;background:rgba(10,14,20,0.95);padding:16px 6%;
    border-bottom:1px solid #ff5a0022;backdrop-filter:blur(10px);z-index:100;
    display:flex;justify-content:space-between;
  }
  main{margin-left:260px;padding:100px 6% 60px;flex:1}
  .toggle{
    position:relative;display:inline-block;width:50px;height:26px;
  }
  .toggle input{display:none}
  .slider{
    position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
    background:#333;border-radius:999px;transition:.3s;
  }
  .slider:before{
    position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;
    background:white;border-radius:50%;transition:.3s;
  }
  input:checked + .slider{background:#ff5a00}
  input:checked + .slider:before{transform:translateX(24px)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="nav-item active">Overview</div>
  <div class="nav-item">Servers</div>
  <div class="nav-item" onclick="showSettings()">General Settings</div>
  <div class="nav-item">Activity Log</div>
</div>

<header>
  <div style="font-size:26px;color:#ff5a00">DORITOS GUY DASHBOARD</div>
  <button onclick="loginWithDiscord()" style="background:#ff5a00;color:black;padding:12px 28px;border:none;border-radius:12px;font-weight:bold;cursor:pointer">CONNECT DISCORD</button>
</header>

<main id="main-content">
  <h1 style="color:#ff5a00;font-size:48px">Overview</h1>
  
  <div style="margin:40px 0">
    <h2>Crunch-O-Meter</h2>
    <div style="background:#1a1f2e;padding:30px;border-radius:16px">
      <div style="font-size:60px;color:var(--dust)" id="score">78%</div>
      <div style="height:50px;background:#111;border-radius:999px;overflow:hidden;position:relative">
        <div style="height:100%;width:78%;background:linear-gradient(90deg,#ffd93d,#ff8c00,#ff5a00);position:relative" id="fill">
          <div style="position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4));animation:wave 3s linear infinite" id="wave"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const CLIENT_ID = "1522890288920793162";

function loginWithDiscord() {
  const REDIRECT_URI = window.location.href.split('#')[0];
  const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify+guilds`;
  window.location.href = url;
}

function showSettings() {
  document.getElementById('main-content').innerHTML = `
    <h1 style="color:#ff5a00">General Settings</h1>
    <div style="background:#161b22;padding:30px;border-radius:16px;max-width:800px">
      <h3>Security</h3>
      <div style="margin:20px 0"><label><input type="checkbox" checked> Member Verification</label></div>
      <div style="margin:20px 0"><label><input type="checkbox" checked> Auto Moderation</label></div>
      <div style="margin:20px 0"><label><input type="checkbox"> Anti-Raid Protection</label></div>
      
      <h3 style="margin-top:40px">Fun Commands</h3>
      <div style="margin:20px 0"><label><input type="checkbox" checked> /chips</label></div>
      <div style="margin:20px 0"><label><input type="checkbox" checked> /summondoritos</label></div>
      <div style="margin:20px 0"><label><input type="checkbox"> /crunchtime</label></div>
    </div>
  `;
}

// Liquid wave animation
setInterval(() => {
  const wave = document.getElementById('wave');
  if (wave) wave.style.animation = 'none';
  setTimeout(() => {
    if (wave) wave.style.animation = 'wave 3s linear infinite';
  }, 10);
}, 3000);
</script>
</body>
</html>
